name: Bump, Build and Publish on Push to master

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - ".github/**"
      - "README.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"

permissions:
  contents: write

concurrency:
  group: on-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Run Checks
    uses: ./.github/workflows/spotless.yml

  build:
    name: Build Mod
    uses: ./.github/workflows/build.yml

  upload:
    name: Upload artifacts
    runs-on: ubuntu-latest
    needs: [build, check]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Built Jars
          path: |
            ./build/libs/*.jar
          if-no-files-found: error
          compression-level: 0
